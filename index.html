<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Importación</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient-start: #EEF2FF;
            --bg-gradient-end: #E0E7FF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --card-bg: rgba(255, 255, 255, 0.95);
            --border: #E5E7EB;
            --success-bg: #D1FAE5;
            --success-text: #065F46;
            --danger-bg: #FEE2E2;
            --danger-text: #991B1B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08), 0 5px 15px rgba(0, 0, 0, 0.03);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-prefix {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 12px 12px 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        
        input[type="number"]::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 8px;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #resultado {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .result-row.total {
            font-weight: 700;
            font-size: 1.1rem;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 8px;
            margin-top: 8px;
        }
        
        .status-message {
            margin-top: 12px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Calculadora de Impuestos (FL 7%)</h2>
        
        <div class="form-group">
            <label for="precio">Precio del artículo</label>
            <div class="input-wrapper">
                <span class="input-prefix">$</span>
                <input type="number" id="precio" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>

        <div class="form-group">
            <label for="envio">Costo de envío (Opcional)</label>
            <div class="input-wrapper">
                <span class="input-prefix">$</span>
                <input type="number" id="envio" placeholder="0.00" min="0" step="0.01">
            </div>
        </div>

        <button onclick="calcular()">Calcular Total</button>
        
        <div id="resultado"></div>
    </div>
</div>

<script>
    function calcular() {
        // Obtener valores y manejar campos vacíos
        const precioInput = document.getElementById('precio').value;
        const envioInput = document.getElementById('envio').value;
        
        const precio = parseFloat(precioInput) || 0;
        const envio = parseFloat(envioInput) || 0;

        if (precio === 0 && envio === 0) {
            return; // No hacer nada si ambos están vacíos
        }

        // Calcula la base para el impuesto (Precio + Envío)
        const subtotal = precio + envio;
        const impuesto = subtotal * 0.07;
        const total = subtotal + impuesto;

        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block';

        let estadoHtml = '';
        if (total > 200) {
            resDiv.style.backgroundColor = 'var(--danger-bg)';
            resDiv.style.color = 'var(--danger-text)';
            estadoHtml = `<div class="status-message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            EXCEDES LÍMITE DE ADUANAS.
                          </div>`;
        } else {
            resDiv.style.backgroundColor = 'var(--success-bg)';
            resDiv.style.color = 'var(--success-text)';
            estadoHtml = `<div class="status-message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            DENTRO DEL LÍMITE.
                          </div>`;
        }

        resDiv.innerHTML = `
            <div class="result-row">
                <span>Precio del artículo:</span>
                <span>$${precio.toFixed(2)} USD</span>
            </div>
            ${envio > 0 ? `
            <div class="result-row">
                <span>Costo de envío:</span>
                <span>$${envio.toFixed(2)} USD</span>
            </div>` : ''}
            <div class="result-row">
                <span>Impuesto (7%):</span>
                <span>$${impuesto.toFixed(2)} USD</span>
            </div>
            <div class="result-row total">
                <span>Total a Pagar:</span>
                <span>$${total.toFixed(2)} USD</span>
            </div>
            ${estadoHtml}
        `;
    }

    // Permitir usar "Enter" para calcular
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            calcular();
        }
    });
</script>
</body>
</html>
